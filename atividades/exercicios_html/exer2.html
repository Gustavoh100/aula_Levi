<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pizzaria</title>
</head>

<body>
    <h1>Pizzaria Italiana</h1>
    <h2>boas-vindas a melhor pizzaria da região!</h2>
    <h3>Formulario para pedidos:</h3>
    <main>
        <form>
            <br> <label>Nome do cliente:</label>
            <input type="text">
            <label>Endereço:</label>
            <input type="text">

            <br><label>Tamanho da Pizza:</label>
            <input type="radio" name="Tamanho">Familia</input>
            <input type="radio" name="Tamanho">Grande</input>
            <input type="radio" name="Tamanho">media</input>
            <input type="radio" name="Tamanho">pequena</input>

            <br><label>Adicionais:</label>
            <input type="checkbox" name="Adicionais">Refrigerante</input>
            <input type="checkbox" name="Adicionais">sache</input>
            <input type="checkbox" name="Adicionais">guardanapo</input>

            <br><label>campo de observação:</label>
            <input type="checkbox" name="retirar">retirar tomate </input>
            <input type="checkbox" name="retirar">retirar brocolis</input>
            <input type="checkbox" name="retirar">retirar ovo</input>

            <br><button>finalizar pedido</button>

        </form>







    </main>

</body>

</html>
